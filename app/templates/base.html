<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Nexus{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='img/nexus-logo.svg') }}" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <style>
    :root {
      /* Fonds : noir "pierre" chaud plutôt que noir-bleu froid (cf. recherche
         2026 sur l'humanisation des palettes SaaS — neutres chauds famille
         pierre/sable au lieu du noir-bleu clinique). */
      --navy-950: #0c0a09;
      --navy-900: #17140f;
      --navy-800: #221d17;
      --navy-700: #332c22;
      --blue-600: #2563EB;
      --blue-500: #3B82F6;
      --blue-400: #60A5FA;
      --accent: #38BDF8;
      --accent-glow: rgba(56, 189, 248, 0.25);
      /* Confiance / sécurité confirmée (2FA, e-mail vérifié, chiffrement) */
      --trust-green: #22C55E;
      --trust-green-glow: rgba(34, 197, 94, 0.25);
      /* Glass teinté chaud au lieu de blanc pur */
      --glass-bg: rgba(250, 247, 242, 0.04);
      --glass-bg-strong: rgba(250, 247, 242, 0.07);
      --glass-border: rgba(250, 247, 242, 0.09);
      --glass-border-hover: rgba(250, 247, 242, 0.17);
      /* Texte : blanc cassé chaud + gris pierre au lieu de gris ardoise-bleu */
      --text-primary: #FAFAF9;
      --text-secondary: #A8A29E;
      --text-muted: #78716C;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--navy-950);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Fond animé ── */
    .bg-scene {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.12;
      animation: drift 18s ease-in-out infinite;
    }
    .orb-1 {
      width: 600px; height: 600px;
      background: radial-gradient(circle, #1D4ED8 0%, transparent 70%);
      top: -200px; left: -150px;
      animation-duration: 20s;
    }
    .orb-2 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #0369A1 0%, transparent 70%);
      bottom: -100px; right: -100px;
      animation-duration: 25s;
      animation-delay: -8s;
    }
    .orb-3 {
      width: 350px; height: 350px;
      background: radial-gradient(circle, #38BDF8 0%, transparent 70%);
      top: 40%; left: 55%;
      opacity: 0.10;
      animation-duration: 30s;
      animation-delay: -15s;
    }
    @keyframes drift {
      0%,100% { transform: translate(0, 0) scale(1); }
      33%      { transform: translate(40px, -30px) scale(1.05); }
      66%      { transform: translate(-20px, 40px) scale(0.96); }
    }

    /* Grille de points */
    .dot-grid {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image: radial-gradient(rgba(168,162,158,0.07) 1px, transparent 1px);
      background-size: 32px 32px;
    }

    /* ── Verre ── */
    .glass {
      background: var(--glass-bg-strong);
      backdrop-filter: blur(24px) saturate(160%);
      -webkit-backdrop-filter: blur(24px) saturate(160%);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
    }
    .glass-sm {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
    }
    .glass:hover { border-color: var(--glass-border-hover); }

    /* ── Bouton principal ── */
    .btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: linear-gradient(135deg, #1D4ED8, #0369A1);
      color: #fff;
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      letter-spacing: 0.03em;
      padding: 11px 24px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.15);
      cursor: pointer;
      transition: all 0.25s ease;
      box-shadow: 0 4px 20px rgba(29,78,216,0.35), inset 0 1px 0 rgba(255,255,255,0.1);
      width: 100%;
    }
    .btn-primary:hover {
      background: linear-gradient(135deg, #2563EB, #0284C7);
      box-shadow: 0 6px 28px rgba(37,99,235,0.5), inset 0 1px 0 rgba(255,255,255,0.15);
      transform: translateY(-1px);
    }
    .btn-primary:active { transform: translateY(0); }

    .btn-danger {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, #B91C1C, #7F1D1D);
      color: #fff;
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      padding: 10px 20px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.10);
      cursor: pointer;
      transition: all 0.25s;
      box-shadow: 0 4px 16px rgba(185,28,28,0.3);
    }
    .btn-danger:hover {
      background: linear-gradient(135deg, #DC2626, #991B1B);
      transform: translateY(-1px);
    }

    .btn-outline {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      color: var(--text-secondary);
      font-family: 'Outfit', sans-serif;
      font-weight: 500;
      padding: 9px 18px;
      border-radius: 10px;
      border: 1px solid var(--glass-border);
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-outline:hover {
      background: var(--glass-bg-strong);
      border-color: var(--glass-border-hover);
      color: var(--text-primary);
    }

    /* ── Inputs ── */
    .input-field {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      color: var(--text-primary);
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 14px;
      padding: 11px 14px 11px 42px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }
    .input-field::placeholder { color: var(--text-muted); }
    .input-field:focus {
      border-color: var(--blue-500);
      background: rgba(59,130,246,0.07);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
    }
    .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 14px;
      pointer-events: none;
      transition: color 0.2s;
    }
    .input-wrap:focus-within .input-icon { color: var(--blue-400); }
    .input-no-icon { padding-left: 14px; }

    .label {
      display: block;
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 7px;
      letter-spacing: 0.02em;
    }

    /* ── Alertes flash ── */
    .alert {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 16px;
      border: 1px solid transparent;
      animation: slideDown 0.3s ease;
    }
    @keyframes slideDown {
      from { opacity:0; transform: translateY(-8px); }
      to   { opacity:1; transform: translateY(0); }
    }
    .flash-alert-hide {
      animation: slideUpFade 0.35s ease forwards;
    }
    @keyframes slideUpFade {
      from { opacity:1; transform: translateY(0); }
      to   { opacity:0; transform: translateY(-8px); }
    }
    .alert-success {
      background: rgba(34,197,94,0.12);
      border-color: rgba(34,197,94,0.25);
      color: #4ADE80;
    }
    .alert-danger {
      background: rgba(239,68,68,0.12);
      border-color: rgba(239,68,68,0.25);
      color: #F87171;
    }
    .alert-info {
      background: rgba(59,130,246,0.12);
      border-color: rgba(59,130,246,0.25);
      color: #60A5FA;
    }
    .alert-warning {
      background: rgba(234,179,8,0.12);
      border-color: rgba(234,179,8,0.25);
      color: #FBBF24;
    }

    /* ── Badges ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.05em;
      padding: 3px 9px;
      border-radius: 100px;
      font-family: 'Outfit', sans-serif;
    }
    .badge-green  { background: rgba(34,197,94,0.15); color: #4ADE80; border: 1px solid rgba(34,197,94,0.2); }
    .badge-gray   { background: rgba(100,116,139,0.15); color: #94A3B8; border: 1px solid rgba(100,116,139,0.2); }
    .badge-yellow { background: rgba(234,179,8,0.15); color: #FBBF24; border: 1px solid rgba(234,179,8,0.2); }
    .badge-red    { background: rgba(239,68,68,0.15); color: #F87171; border: 1px solid rgba(239,68,68,0.2); }
    .badge-blue   { background: rgba(59,130,246,0.15); color: #60A5FA; border: 1px solid rgba(59,130,246,0.2); }

    /* ── Titres ── */
    h1, h2, h3, h4 {
      font-family: 'Outfit', sans-serif;
    }
    .page-title {
      font-family: 'Outfit', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }

    /* ── Code / mono ── */
    code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      background: rgba(255,255,255,0.07);
      border: 1px solid var(--glass-border);
      padding: 2px 7px;
      border-radius: 6px;
      color: var(--accent);
      letter-spacing: 0.04em;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.22); }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--glass-border), transparent);
      margin: 20px 0;
    }

    /* ── Wrapper principal ── */
    .page-wrapper {
      position: relative;
      z-index: 1;
      min-height: 100vh;
    }

    /* ── Responsive global ── */
    @media (max-width: 600px) {
      .input-field   { font-size: 16px; } /* évite le zoom auto iOS sur les inputs */
      .btn-primary, .btn-outline, .btn-danger {
        font-size: 14px;
        padding: 11px 18px;
      }
      .badge { font-size: 10px; padding: 3px 8px; }
    }
  </style>

  {% block extra_head %}{% endblock %}
</head>
<body>

<!-- Décor de fond -->
<div class="bg-scene">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>
<div class="dot-grid"></div>

<!-- Contenu principal -->
<div class="page-wrapper">
  <!-- Alertes flash globales -->
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div id="flash-alerts" style="position:fixed; top:20px; right:20px; z-index:9999; min-width:300px; max-width:420px;">
        {% for category, message in messages %}
          <div class="alert alert-{{ 'success' if category == 'success' else ('danger' if category == 'danger' else ('warning' if category == 'warning' else 'info')) }} flash-alert">
            <i class="fas fa-{{ 'check-circle' if category == 'success' else ('exclamation-circle' if category == 'danger' else ('exclamation-triangle' if category == 'warning' else 'info-circle')) }}"></i>
            <span>{{ message }}</span>
          </div>
        {% endfor %}
      </div>
      <script>
        // Disparition automatique des messages flash après 5 secondes
        (function () {
          var container = document.getElementById('flash-alerts');
          if (!container) return;
          setTimeout(function () {
            container.querySelectorAll('.flash-alert').forEach(function (el) {
              el.classList.add('flash-alert-hide');
            });
            setTimeout(function () { container.remove(); }, 350);
          }, 5000);
        })();
      </script>
    {% endif %}
  {% endwith %}

  {% block content %}{% endblock %}
</div>

</body>
</html>
