<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Nexus">
  <!-- Branches reliant le nœud central aux 6 nœuds périphériques -->
  <g stroke="#ffffff" stroke-width="3.2" stroke-linecap="round" opacity="0.65">
    <line x1="50" y1="50" x2="50" y2="14"/>
    <line x1="50" y1="50" x2="80" y2="32"/>
    <line x1="50" y1="50" x2="80" y2="68"/>
    <line x1="50" y1="50" x2="50" y2="86"/>
    <line x1="50" y1="50" x2="20" y2="68"/>
    <line x1="50" y1="50" x2="20" y2="32"/>
  </g>

  <!-- Nœuds périphériques (applications connectées) -->
  <g fill="#ffffff" opacity="0.9">
    <circle cx="50" cy="14" r="7"/>
    <circle cx="80" cy="32" r="7"/>
    <circle cx="80" cy="68" r="7"/>
    <circle cx="50" cy="86" r="7"/>
    <circle cx="20" cy="68" r="7"/>
    <circle cx="20" cy="32" r="7"/>
  </g>

  <!-- Nœud central (Nexus / SSO) -->
  <circle cx="50" cy="50" r="14" fill="#ffffff"/>
</svg>
